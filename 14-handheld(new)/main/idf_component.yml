## IDF Component Manager Manifest File
## 立创实战派 ESP32-S3 手持设备 - 组件依赖
## 基于 IDF v5.5.1
dependencies:
  espressif/esp32-camera: "^2.0.10"         # 摄像头驱动 (GC0308)
  lvgl/lvgl: "~8.3.0"                       # LVGL 图形库 (锁定 v8.3.x，不升级 v9)
  espressif/esp_lvgl_port: "~1.4.0"         # ESP-IDF LVGL 适配层
  espressif/esp_lcd_touch_ft5x06: "~1.0.6"  # FT5x06 电容触摸屏驱动
  chmorgan/esp-audio-player: "~1.0.7"       # MP3/WAV 音频播放器
  chmorgan/esp-file-iterator: "1.0.0"       # 文件枚举工具
  espressif/esp_codec_dev: "~1.3.0"         # 音频编解码器 (ES8311/ES7210)
  espressif/esp-sr: "~1.6.0"                # 语音识别
  idf:
    version: ">=5.5.0"
