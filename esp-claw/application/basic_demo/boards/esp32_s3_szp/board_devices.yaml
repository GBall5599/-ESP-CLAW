version: 1.0.0
# SZP Devices Configuration
devices:

  # PCA9557 IO Expander - controls LCD_CS, PA_EN, DVP_PWDN
  - name: io_expander
    chip: pca9557
    type: custom
    version: default
    config:
      i2c_addr: 0x19
    peripherals:
      - name: i2c_master

  # Audio DAC (ES8311, I2C + I2S)
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    dependencies:
      espressif/esp_codec_dev: "~1.5"
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      dac_init_gain: 0
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 100000

  # Audio ADC (ES7210, I2C + I2S)
  - name: audio_adc
    chip: es7210
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 4
      adc_channel_mask: "0011"
      adc_init_gain: 0
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x80
        frequency: 100000

  # LCD Display (ST7789, SPI, 320x240)
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: false
      x_max: 320
      y_max: 240
      invert_color: true
      io_spi_config:
        cs_gpio_num: -1
        dc_gpio_num: 39
        spi_mode: 0
        pclk_hz: 80000000
      lcd_panel_config:
        reset_gpio_num: -1
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_BGR
        bits_per_pixel: 16
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
    peripherals:
      - name: spi_master

  # Touch Panel (FT5x06, I2C)
  - name: lcd_touch
    chip: ft5x06
    type: lcd_touch_i2c
    version: default
    dependencies:
      espressif/esp_lcd_touch:
        version: "*"
        require: public
      espressif/esp_lcd_touch_ft5x06: "^1.0.0"
    config:
      io_i2c_config:
        dev_addr: [0x38]
        lcd_cmd_bits: 8
        scl_speed_hz: 100000
        peripherals:
          - name: i2c_master
      touch_config:
        x_max: 320
        y_max: 240
