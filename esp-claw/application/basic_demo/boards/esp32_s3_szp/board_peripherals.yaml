version: 1.0.0
# SZP Peripherals Configuration
peripherals:
  # I2C Master Bus (SDA=GPIO1, SCL=GPIO2, 100kHz)
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 1
        scl: 2

  # I2S Audio Output (Speaker via ES8311 DAC)
  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s_config
      port: 1
      sample_rate_hz: 16000
      mclk_multiple: 384
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: 38
        bclk: 14
        ws: 13
        dout: 45
        din: 12

  # I2S Audio Input (Mic via ES7210 ADC)
  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config: *i2s_config

  # SPI for LCD (ST7789, SPI3_HOST)
  - name: spi_master
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        mosi_io_num: 40
        sclk_io_num: 41
        max_transfer_sz: 3200

  # LEDC Backlight PWM (GPIO42)
  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 42
      freq_hz: 5000
      duty: 0
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: true
